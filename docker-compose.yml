# Membuss - full bootstrap node docker compose.
#
# This file starts a maximum-capability node with every
# subsystem enabled: anchor engine, relay service, DHT
# server, WebSocket transport, geolocation, mDNS, bloom
# filters, and metrics. Use it to run a bootstrap peer
# that other nodes can connect to.
#
# Usage:
#   docker compose build
#   docker compose up -d
#   docker compose logs -f membuss
#   docker compose exec membuss membuss-cli peers
#
# Stop & wipe the local state:
#   docker compose down -v

services:
  membuss:
    build:
      context: .
      dockerfile: Dockerfile
    image: membuss:local

    container_name: membuss

    restart: unless-stopped

    ports:
      - "4001:4001/tcp" # libp2p TCP
      - "4001:4001/udp" # libp2p QUIC
      - "4002:4002/tcp" # libp2p WebSocket
      - "5001:5001/tcp" # Node API (local control plane)
      - "8081:8080/tcp" # Mem-Gate public HTTP gateway
      - "50051:50051/tcp" # gRPC (membuss-cli)

    volumes:
      - membuss-data:/var/lib/membuss
      - ./deploy/membuss-bootstrap.yaml:/etc/membuss/config.yaml:ro

    environment:
      MEMBUSS_DATA_DIR: "/var/lib/membuss"
      MEMBUSS_MDNS: "true"
      MEMBUSS_NO_ANCHOR: "false"
      # MEMBUSS_ANNOUNCE_ADDRS: ""
      MEMBUSS_BOOTSTRAP_PEERS: "/ip4/45.10.162.79/udp/4001/quic-v1/p2p/12D3KooWMNbuDSWaMw7evxzsp9CtaphofzxcEbHisWQQUmg7zfUx"
      MEMBUSS_REPROVIDE_INTERVAL: "10m"

    healthcheck:
      test:
        [
          "CMD",
          "/usr/local/bin/membuss-cli",
          "--addr",
          "127.0.0.1:50051",
          "ping",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  membuss-data:
    name: membuss-data
