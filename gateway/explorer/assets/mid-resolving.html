{{define "mid-resolving_body"}}
<section class="mid-detail">
  <h1>Resolving content from network...</h1>
  <div class="mid-string mono">
    <code>{{.MID}}</code>
  </div>

  <div class="card" style="max-width:600px;margin:24px auto">
    <h2>Progress</h2>
    <div style="background:#e3e6ec;border-radius:4px;height:24px;overflow:hidden;margin:12px 0">
      <div id="progress-bar" style="background:#2257c6;height:100%;width:0%;transition:width 0.2s"></div>
    </div>
    <p id="progress-text" class="muted" style="margin:0;text-align:center">Connecting...</p>
  </div>
</section>

<script>
(function() {
  var mid = {{.MID}};
  var bar = document.getElementById("progress-bar");
  var text = document.getElementById("progress-text");
  var es = new EventSource("/explorer/mid/" + mid + "/resolve-stream");
  es.onmessage = function(ev) {
    var d = JSON.parse(ev.data);
    if (d.error) {
      text.textContent = "Error: " + d.error;
      text.className = "warn";
      es.close();
      return;
    }
    if (d.done) {
      bar.style.width = "100%";
      text.textContent = "Complete!";
      text.className = "ok";
      es.close();
      setTimeout(function() {
        window.location.href = "/explorer/mid/" + mid;
      }, 500);
      return;
    }
    if (d.total > 0) {
      var pct = Math.min(100, Math.round(d.blocks * 100 / d.total));
      bar.style.width = pct + "%";
      text.textContent = d.blocks + " / " + d.total + " blocks (" + pct + "%)";
    } else if (d.blocks > 0) {
      var pulse = 30 + Math.min(70, d.blocks * 10);
      bar.style.width = pulse + "%";
      text.textContent = d.blocks + " blocks resolved";
    }
  };
  es.onerror = function() {
    text.textContent = "Connection lost. Retrying...";
    text.className = "warn";
  };
})();
</script>
{{end}}
