{{define "upload_body"}}
<section class="upload">
  <h1>Upload Content</h1>
  <p class="muted">Upload a file to the Membuss network. The file will be chunked, content-addressed, and sealed.</p>
  
  <form method="POST" action="/explorer/upload" enctype="multipart/form-data" class="upload-form">
    <div class="form-group">
      <label for="file">Select file</label>
      <input type="file" id="file" name="file" required>
    </div>
    <button class="btn primary" type="submit">Upload</button>
  </form>
</section>
{{end}}
