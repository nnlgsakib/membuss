{{define "peers_body"}}
<section>
  <h1>Peers</h1>
  <p class="muted">Local PEX peer table. {{.PeerCount}} peer(s) known.</p>
  <table class="data">
    <thead>
      <tr>
        <th>Peer ID</th>
        <th>Addresses</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody>
      {{range .Peers}}
      <tr>
        <td class="mono small">{{.PeerID}}</td>
        <td>
          <ul class="addrs">
            {{range .Addrs}}<li class="mono small">{{.}}</li>{{end}}
          </ul>
        </td>
        <td>{{if .Connected}}connected{{else}}known{{end}}</td>
      </tr>
      {{else}}
      <tr><td colspan="3" class="muted">No peers known yet.</td></tr>
      {{end}}
    </tbody>
  </table>
</section>
{{end}}
