name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  generate-notes:
    name: Generate Release Notes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get tag info
        id: meta
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"

          # Find the previous tag
          PREV_TAG=$(git tag --sort=-version:refname | grep -A1 "^${TAG}$" | tail -1)
          if [ "$PREV_TAG" = "$TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD | head -1)
          fi
          echo "prev_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"

      - name: Build release notes
        run: |
          TAG="${{ steps.meta.outputs.tag_name }}"
          PREV="${{ steps.meta.outputs.prev_tag }}"

          echo "# Membuss $TAG" > release-notes.md
          echo "" >> release-notes.md
          echo "## What's Changed" >> release-notes.md
          echo "" >> release-notes.md

          FIRST_COMMIT=$(git rev-list --max-parents=0 HEAD | head -1)
          if [ "$PREV" != "$FIRST_COMMIT" ]; then
            echo "Commits since $PREV:" >> release-notes.md
            echo "" >> release-notes.md
            git log --oneline "$PREV..$TAG" >> release-notes.md
          else
            echo "Initial release." >> release-notes.md
            echo "" >> release-notes.md
            git log --oneline >> release-notes.md
          fi

          echo "" >> release-notes.md
          echo "---" >> release-notes.md
          echo "**Full changelog**: https://github.com/${{ github.repository }}/compare/${PREV}...${TAG}" >> release-notes.md

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md
          retention-days: 1

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: explorer-web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: explorer-web

      - name: Build frontend
        run: npm run build
        working-directory: explorer-web

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: gateway/explorer/web/dist
          retention-days: 1

  build-binaries:
    name: Build Go Binaries
    needs: [build-frontend, generate-notes]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: linux
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: windows
            goarch: amd64
            ext: ".exe"
            archive: zip
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: gateway/explorer/web/dist

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build daemon
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -trimpath -ldflags "-s -w -X github.com/nnlgsakib/membuss/rpc/server.Build=${{ github.ref_name }}" -o bin/membuss${{ matrix.ext }} ./cmd/membuss

      - name: Build CLI
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -trimpath -ldflags "-s -w" -o bin/membuss-cli${{ matrix.ext }} ./cmd/membuss-cli

      - name: Package binaries (zip)
        if: matrix.archive == 'zip'
        run: |
          cd bin
          zip -r ../membuss-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.zip membuss${{ matrix.ext }} membuss-cli${{ matrix.ext }}

      - name: Package binaries (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          cd bin
          tar -czf ../membuss-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz membuss${{ matrix.ext }} membuss-cli${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            membuss-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}
          retention-days: 1

  build-desktop-windows:
    name: Build Desktop (Windows)
    needs: generate-notes
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: desktop/frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Add NSIS to PATH
        run: echo "C:\Program Files (x86)\NSIS" >> $env:GITHUB_PATH

      - name: Build desktop app (NSIS installer)
        working-directory: desktop
        env:
          CGO_ENABLED: 0
        run: wails build --platform windows/amd64 --nsis

      - name: List build output
        shell: bash
        run: ls -la desktop/build/bin/

      - name: Rename installer
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          INSTALLER=$(ls desktop/build/bin/Membuss-*-installer.exe 2>/dev/null | head -1)
          if [ -z "$INSTALLER" ]; then
            echo "ERROR: No installer found"
            exit 1
          fi
          cp "$INSTALLER" "Membuss-${TAG}-windows-amd64-installer.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-installer
          path: Membuss-*-windows-amd64-installer.exe
          retention-days: 1

  build-desktop-linux:
    name: Build Desktop (Linux)
    needs: generate-notes
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: desktop/frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev \
            libglib2.0-dev fuse libfuse2 wget file

      - name: Install appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          ./appimagetool --appimage-extract
          mv squashfs-root /opt/appimagetool

      - name: Build desktop app
        working-directory: desktop
        run: |
          wails build --platform linux/amd64

      - name: Create AppDir structure
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          APPDIR="Membuss.AppDir"

          mkdir -p "$APPDIR/usr/bin"
          mkdir -p "$APPDIR/usr/share/applications"
          mkdir -p "$APPDIR/usr/share/icons/hicolor/256x256/apps"

          cp desktop/build/bin/membuss "$APPDIR/usr/bin/membuss"
          cp desktop/icon.png "$APPDIR/usr/share/icons/hicolor/256x256/apps/membuss.png"
          cp desktop/icon.png "$APPDIR/membuss.png"

          cat > "$APPDIR/membuss.desktop" << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=Membuss
          Exec=membuss
          Icon=membuss
          Categories=Network;Utility;
          Terminal=false
          EOF

          cat > "$APPDIR/AppRun" << 'APPRUN'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/membuss" "$@"
          APPRUN
          chmod +x "$APPDIR/AppRun"

      - name: Build AppImage
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          /opt/appimagetool/AppRun Membuss.AppDir "Membuss-${TAG}-linux-amd64.AppImage"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-appimage
          path: Membuss-*-linux-amd64.AppImage
          retention-days: 1

  release:
    name: Create Release
    needs: [generate-notes, build-binaries, build-desktop-windows, build-desktop-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "{release-*,desktop-*}"
          merge-multiple: true
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            artifacts/membuss-*.zip
            artifacts/membuss-*.tar.gz
            artifacts/Membuss-*-installer.exe
            artifacts/Membuss-*.AppImage
          draft: false
          prerelease: false

