// Wire schema for the Membuss libp2p protocols (PEX, Memex) and
// the CLI <-> daemon gRPC service.
syntax = "proto3";

package membuss.v1;

option go_package = "github.com/nnlgsakib/membuss/proto;membusspb";

// Node is a minimal connectivity probe used by the CLI to verify
// the daemon is reachable on the gRPC endpoint. The full operator
// surface lives on MembussNode below.
service Node {
  rpc Ping(PingRequest) returns (PingResponse);
}

message PingRequest {
  string message = 1;
}

message PingResponse {
  string message = 1;
  string build = 2;
}

// MembussNode is the operator-facing daemon service. The CLI
// dials this; humans usually interact with it through membuss-cli.
service MembussNode {
  rpc Add(AddRequest) returns (AddResponse);
  rpc Get(GetRequest) returns (stream GetChunk);
  rpc Seal(SealRequest) returns (SealResponse);
  rpc Unseal(UnsealRequest) returns (UnsealResponse);
  rpc Stat(StatRequest) returns (StatResponse);
  rpc Peers(PeersRequest) returns (PeersResponse);
  rpc DHTPeek(DHTPeekRequest) returns (DHTPeekResponse);
  rpc GC(GCRequest) returns (GCResponse);
  rpc AnchorStatus(AnchorStatusRequest) returns (AnchorStatusResponse);
}

message AddRequest {
  string path = 1;
  string chunker = 2;
  uint32 chunk_size = 3;
  bool no_seal = 4;
  // Phase 19: optional human-friendly metadata captured at
  // upload time and replayed on download. Filename is the
  // client-side file name (drives the Content-Disposition
  // header on the gateway). MimeType overrides the
  // extension-based sniff when the gateway serves the
  // content (e.g. "text/html; charset=utf-8").
  string name = 5;
  string mime_type = 6;
}

message AddResponse {
  string mid = 1;
  uint64 size = 2;
  uint64 blocks = 3;
  bool sealed = 4;
}

message GetRequest {
  string mid = 1;
  uint64 offset = 2;
  uint64 limit = 3;
}

message GetChunk {
  bytes data = 1;
  uint64 index = 2;
  uint64 total = 3;
}

message SealRequest {
  string mid = 1;
  bool recursive = 2;
}

message SealResponse {
  uint64 pinned = 1;
  bool already = 2;
}

message UnsealRequest {
  string mid = 1;
}

message UnsealResponse {
  uint64 removed = 1;
}

message StatRequest {
  string mid = 1;
}

message StatResponse {
  bool present = 1;
  uint64 size = 2;
  uint64 blocks = 3;
  bool sealed = 4;
  uint64 codec = 5;
  ErasureInfo erasure = 6;
  // Phase 19: human-friendly metadata stored at Add time.
  string name = 7;
  string mime_type = 8;
}

message ErasureInfo {
  uint32 data_shards = 1;
  uint32 parity_shards = 2;
  repeated string shard_mids = 3;
}

// NodePeerInfo is the gRPC-facing peer descriptor used by the
// Peers and DHTPeek RPCs. The libp2p wire-level PeerInfo (used
// by PEX) is defined further below.
message NodePeerInfo {
  string peer_id = 1;
  repeated string addrs = 2;
}

message PeersRequest {
  uint32 limit = 1;
}

message PeersResponse {
  repeated NodePeerInfo peers = 1;
  uint32 total = 2;
}

message DHTPeekRequest {
  string mid = 1;
  uint32 limit = 2;
}

message DHTPeekResponse {
  repeated NodePeerInfo providers = 1;
}

message GCRequest {
  bool all = 1;
}

message GCResponse {
  uint64 bytes_freed = 1;
  uint64 blocks_kept = 2;
}

message AnchorStatusRequest {}

message AnchorStatusResponse {
  string peer_id = 1;
  int64 uptime_seconds = 2;
  int64 blocks_held = 3;
  int32 anchors = 4;
  int32 backlog = 5;
  int64 synced = 6;
}

// --- libp2p wire types (used by PEX and Memex) ---

// Block is a single chunk of content, addressed by its MID.
message Block {
  bytes data = 1;
  string mid = 2;
  uint64 size = 3;
}

// DAGNode is one node in a Merkle DAG.
message DAGNode {
  repeated string links = 1;
  bytes data = 2;
  string mid = 3;
}

// Shard is one erasure-coded shard of a block.
message Shard {
  bytes data = 1;
  string mid = 2;
  uint32 index = 3;
  string original_mid = 4;
}

// ErasureManifest is stored under the original block's MID.
message ErasureManifest {
  string original_mid = 1;
  uint32 data_shards = 2;
  uint32 parity_shards = 3;
  repeated string shard_mids = 4;
  uint64 original_size = 5;
}

// Reachability describes how a peer is reachable from a remote
// node. Used by PEX to decide which addresses are worth sharing
// in a gossip round (Phase 12).
enum Reachability {
  UNKNOWN    = 0;
  PUBLIC     = 1;
  PRIVATE    = 2;
  RELAY_ONLY = 3;
}

// PeerInfo is one entry in a PEX gossip payload. The libp2p
// wire format was extended in Phase 12 with relay_addrs,
// reachability and last_dial_success; the field tags are kept
// compatible with the old shape (1=peer_id, 2=addrs, 3=last_seen)
// so older nodes can still parse the message (the new fields
// are simply ignored).
message PeerInfo {
  string        peer_id            = 1;
  repeated string addrs            = 2;
  repeated string relay_addrs      = 3;   // Phase 12
  int64          last_seen         = 4;
  Reachability   reachability      = 5;   // Phase 12
  bool           last_dial_success = 6;   // Phase 12
}

// PEXMessage is the body of a /membuss/pex/1.0.0 gossip frame.
message PEXMessage {
  repeated PeerInfo peers = 1;
}

// WantEntry is one entry in a Memex want list.
message WantEntry {
  string mid = 1;
  int32 priority = 2;
  bool send_dont_have = 3;
}

// MemexMessage is the body of a /membuss/memex/1.0.0 frame.
message MemexMessage {
  repeated WantEntry wants = 1;
  repeated Block blocks = 2;
  repeated string have_mids = 3;
  repeated string cancel = 4;
  // Phase 19: per-MID object metadata (filename, MIME type)
  // travels alongside blocks so the receiver can persist it
  // locally. Only populated for the root block of a DAG.
  map<string, ObjectInfo> object_infos = 5;
}

// ObjectInfo carries the user-facing metadata that
// content-addressed stores usually lose: the original
// filename and MIME type. It is stored side-band under
// the /m/ namespace and exchanged via Memex so every
// node in the network can serve content with the right
// Content-Type and Content-Disposition.
message ObjectInfo {
  string name = 1;
  string mime_type = 2;
  uint64 size = 3;
}

// BloomAnnouncement is the body of a /membuss/memex-bloom/1.0.0
// frame (Phase 13). Peers periodically broadcast the bloom
// filter of their sealed MID set so Memex sessions can avoid
// asking providers that are guaranteed not to have a block.
message BloomAnnouncement {
  bytes  bloom_filter  = 1;   // serialized bloom filter (MarshalBinary)
  uint64 item_count    = 2;   // approximate MIDs represented
  uint64 capacity      = 3;   // configured capacity
  double fp_rate       = 4;   // configured false-positive rate
}
