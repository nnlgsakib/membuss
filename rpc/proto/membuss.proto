// Phase 4 wire schema for the libp2p-based PEX gossip protocol
// and the CLI <-> daemon gRPC service.
syntax = "proto3";

package membuss.v1;

option go_package = "github.com/nnlgsakib/membuss/proto;membusspb";

// Ping is a connectivity probe used by the CLI to verify the daemon
// is reachable on the gRPC endpoint.
service Node {
  // Ping returns a static reply; useful for health checks and
  // connection bring-up.
  rpc Ping(PingRequest) returns (PingResponse);
}

message PingRequest {
  // Optional caller-supplied message echoed back in the response.
  // Useful for round-trip checks.
  string message = 1;
}

message PingResponse {
  // The echoed message (empty if the request had none).
  string message = 1;
  // The daemon's build identifier (set at compile time).
  string build = 2;
}

// Block is a single chunk of content, addressed by its MID.
message Block {
  bytes data = 1;
  string mid = 2;
  uint64 size = 3;
}

// DAGNode is one node in a Merkle DAG.
message DAGNode {
  repeated string links = 1;
  bytes data = 2;
  string mid = 3;
}

// Shard is one erasure-coded shard of a block.
message Shard {
  bytes data = 1;
  string mid = 2;
  uint32 index = 3;
  string original_mid = 4;
}

// ErasureManifest is stored under the original block's MID.
message ErasureManifest {
  string original_mid = 1;
  uint32 data_shards = 2;
  uint32 parity_shards = 3;
  repeated string shard_mids = 4;
  uint64 original_size = 5;
}

// PeerInfo is one entry in a PEX gossip payload.
message PeerInfo {
  // The peer ID (string form).
  string peer_id = 1;
  // Multiaddrs the peer is reachable at.
  repeated string addrs = 2;
  // Wall-clock time the peer was last seen, in seconds since
  // the Unix epoch. Receivers use this to age out stale entries.
  int64 last_seen = 3;
}

// PEXMessage is the body of a /membuss/pex/1.0.0 gossip frame.
// It carries a batch of PeerInfo entries.
message PEXMessage {
  // Sender's view of the network, up to 256 entries.
  repeated PeerInfo peers = 1;
}
